<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<title>Le Cercle — jeux à boire absurdes</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="shared/shared.css" />

<style>
  body { overflow-x: hidden; }
  .hub {
    min-height: 100vh;
    position: relative;
    background:
      radial-gradient(ellipse at 50% 0%, var(--bg-velvet2) 0%, var(--bg-velvet) 35%, var(--bg-deep) 75%),
      var(--bg-deep);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 80px 24px 60px;
  }

  .hub-head {
    position: relative;
    z-index: 2;
    text-align: center;
    margin-bottom: 64px;
  }
  .hub-eyebrow {
    font-family: 'Bebas Neue', sans-serif;
    color: var(--gold);
    letter-spacing: 0.4em;
    font-size: 13px;
    opacity: 0.85;
  }
  .hub-title {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-weight: 900;
    font-size: clamp(48px, 7vw, 88px);
    margin: 6px 0 8px;
    color: var(--gold-pale);
    text-shadow:
      0 0 14px rgba(255, 43, 74, 0.7),
      0 0 32px rgba(255, 43, 74, 0.35),
      2px 2px 0 rgba(0,0,0,0.4);
    letter-spacing: 0.01em;
    animation: hub-title-pulse 5s ease-in-out infinite;
  }
  @keyframes hub-title-pulse {
    0%, 100% {
      text-shadow:
        0 0 14px rgba(255, 43, 74, 0.7),
        0 0 32px rgba(255, 43, 74, 0.35),
        2px 2px 0 rgba(0,0,0,0.4);
    }
    50% {
      text-shadow:
        0 0 20px rgba(255, 43, 74, 0.85),
        0 0 48px rgba(255, 43, 74, 0.5),
        0 0 70px rgba(252, 211, 77, 0.25),
        2px 2px 0 rgba(0,0,0,0.4);
    }
  }
  .hub-tag {
    font-family: 'Special Elite', monospace;
    color: var(--neon-rose);
    font-size: 14px;
    letter-spacing: 0.15em;
  }

  .hub-grid {
    position: relative;
    z-index: 2;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 28px;
    max-width: 800px;
    width: 100%;
  }

  .game-card {
    position: relative;
    display: block;
    text-decoration: none;
    background:
      linear-gradient(135deg, var(--ivory) 0%, var(--cream) 100%);
    color: var(--ink);
    border-radius: 8px;
    padding: 36px 28px 32px;
    overflow: hidden;
    box-shadow:
      0 0 0 2px var(--gold),
      0 0 0 5px var(--bg-deep),
      0 0 0 7px var(--gold-deep),
      0 18px 40px rgba(0,0,0,0.5);
    transition: transform 0.18s ease-out, box-shadow 0.18s ease-out;
    text-align: center;
  }
  .game-card::before {
    content: "";
    position: absolute;
    inset: 8px;
    border: 1px dashed rgba(140, 106, 20, 0.35);
    border-radius: 4px;
    pointer-events: none;
  }
  .game-card-eyebrow {
    font-family: 'Bebas Neue', sans-serif;
    color: var(--gold-deep);
    letter-spacing: 0.32em;
    font-size: 11px;
    margin-bottom: 8px;
  }
  .game-card-title {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-weight: 900;
    font-size: clamp(26px, 3vw, 36px);
    color: var(--copper);
    line-height: 1.05;
    margin: 0 0 10px;
  }
  .game-card-sub {
    font-family: 'Special Elite', monospace;
    font-size: 13px;
    color: rgba(26, 14, 8, 0.7);
    letter-spacing: 0.06em;
    line-height: 1.4;
    min-height: 38px;
  }
  .game-card-cta {
    display: inline-block;
    margin-top: 18px;
    padding: 10px 20px;
    background: linear-gradient(180deg, var(--copper) 0%, #7a1224 100%);
    color: var(--ivory);
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 0.2em;
    font-size: 13px;
    border: 2px solid var(--gold);
    border-radius: 4px;
  }

  a.game-card:hover {
    transform: translateY(-4px);
    box-shadow:
      0 0 0 2px var(--gold),
      0 0 0 5px var(--bg-deep),
      0 0 0 7px var(--gold-deep),
      0 22px 50px rgba(0,0,0,0.6),
      0 0 60px rgba(212, 175, 55, 0.35);
  }

  .game-card.locked { cursor: not-allowed; }
  .game-card.locked .game-card-title,
  .game-card.locked .game-card-sub,
  .game-card.locked .game-card-eyebrow { opacity: 0.55; }
  .game-card-veil {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(26, 14, 8, 0.45);
    -webkit-backdrop-filter: blur(2px);
    backdrop-filter: blur(2px);
    border-radius: 8px;
    z-index: 4;
  }
  .game-card-veil span {
    font-family: 'Bebas Neue', sans-serif;
    color: var(--gold-pale);
    font-size: 22px;
    letter-spacing: 0.4em;
    padding: 12px 24px;
    border: 2px solid var(--gold);
    background: rgba(0, 0, 0, 0.55);
    border-radius: 4px;
    transform: rotate(-3deg);
  }

  .hub-foot {
    position: relative;
    z-index: 2;
    margin-top: auto;
    padding-top: 60px;
    font-family: 'Special Elite', monospace;
    font-size: 12px;
    color: rgba(245, 233, 208, 0.45);
    letter-spacing: 0.12em;
  }

  @media (prefers-reduced-motion: reduce) {
    .hub-title { animation: none; }
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <script type="text/babel" data-presets="react" src="shared/shared.js"></script>

  <script type="text/babel" data-presets="react">
    function Hub() {
      return (
        <div className="hub">
          <DustParticles />
          <header className="hub-head">
            <div className="hub-eyebrow">— ★ établi 2026 ★ —</div>
            <h1 className="hub-title">Le Cercle</h1>
            <div className="hub-tag">jeux à boire pour soirées sans retour</div>
          </header>
          <main className="hub-grid">
            <a className="game-card" href="roulette.html">
              <div className="game-card-eyebrow">JEU №1</div>
              <h2 className="game-card-title">Roulette Congolaise</h2>
              <p className="game-card-sub">on ne peut que perdre</p>
              <span className="game-card-cta">JOUER</span>
            </a>
            <div className="game-card locked" aria-disabled="true">
              <div className="game-card-eyebrow">JEU №2</div>
              <h2 className="game-card-title">Fuck Marry Kill</h2>
              <p className="game-card-sub">trois âmes, trois verdicts</p>
              <span className="game-card-cta">JOUER</span>
              <div className="game-card-veil"><span>BIENTÔT</span></div>
            </div>
          </main>
          <footer className="hub-foot">aucune chance n'a été harmée durant ce site</footer>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Hub />);
  </script>
</body>
</html>
