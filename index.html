<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<title>Roulette Congolaise</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,700&family=Special+Elite&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --bg-deep:    #1a0808;
    --bg-velvet:  #5a0d1a;
    --bg-velvet2: #7a1224;
    --gold:       #d4af37;
    --gold-pale:  #f0c987;
    --gold-deep:  #8c6a14;
    --neon-red:   #ff2b4a;
    --neon-rose:  #ff6b8a;
    --cream:      #f5e9d0;
    --ivory:      #faf2dd;
    --ink:        #1a0e08;
    --copper:     #c14b4b;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    background: var(--bg-deep);
    color: var(--ivory);
    font-family: 'Playfair Display', serif;
    overflow-x: hidden;
    min-height: 100vh;
  }

  .app {
    min-height: 100vh;
    position: relative;
    background:
      radial-gradient(ellipse at 50% 0%, var(--bg-velvet2) 0%, var(--bg-velvet) 35%, var(--bg-deep) 75%),
      var(--bg-deep);
    overflow: hidden;
    transition: transform 0.05s;
  }
  .app::before {
    content: "";
    position: absolute; inset: 0;
    background-image:
      repeating-linear-gradient(45deg, transparent 0 8px, rgba(0,0,0,0.06) 8px 9px),
      repeating-linear-gradient(-45deg, transparent 0 8px, rgba(255,255,255,0.025) 8px 9px);
    pointer-events: none;
    mix-blend-mode: overlay;
  }
  .bg-vignette {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%);
    pointer-events: none;
    z-index: 1;
  }
  .bg-stars { position: absolute; inset: 0; pointer-events: none; z-index: 1; }
  .bg-stars span {
    position: absolute;
    width: 2px; height: 2px;
    background: var(--gold-pale);
    border-radius: 50%;
    opacity: 0.5;
    box-shadow: 0 0 4px var(--gold-pale);
    animation: twinkle 3s infinite ease-in-out;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.2; transform: scale(0.6); }
    50% { opacity: 1; transform: scale(1.2); }
  }

  .app.shaking { animation: shake 0.7s cubic-bezier(.36,.07,.19,.97); }
  @keyframes shake {
    0%, 100% { transform: translate(0, 0) rotate(0); }
    10% { transform: translate(-12px, -6px) rotate(-1deg); }
    20% { transform: translate(10px, 4px) rotate(1.2deg); }
    30% { transform: translate(-8px, 8px) rotate(-1.5deg); }
    40% { transform: translate(12px, -4px) rotate(0.8deg); }
    50% { transform: translate(-6px, 6px) rotate(-0.5deg); }
    60% { transform: translate(8px, -2px) rotate(0.6deg); }
    70% { transform: translate(-4px, 4px) rotate(-0.3deg); }
    80% { transform: translate(2px, -1px) rotate(0.2deg); }
  }

  .head {
    position: relative;
    z-index: 2;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 28px 40px 20px;
    gap: 24px;
  }
  .head-left { justify-self: start; }
  .head-right { justify-self: end; display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
  .player-input-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 4px 4px 12px;
    border: 1.5px solid var(--gold);
    border-radius: 2px;
    background: rgba(0,0,0,0.3);
    position: relative;
  }
  .player-input-wrap::before, .player-input-wrap::after {
    content: "";
    position: absolute;
    width: 6px; height: 6px;
    background: var(--gold);
    border-radius: 50%;
  }
  .player-input-wrap::before { top: -3px; left: -3px; }
  .player-input-wrap::after { bottom: -3px; right: -3px; }
  .player-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 12px;
    letter-spacing: 0.18em;
    color: var(--gold-pale);
  }
  .player-input {
    appearance: none;
    background: transparent;
    border: 0;
    border-left: 1px solid rgba(212,175,55,0.4);
    color: var(--ivory);
    font-family: 'Special Elite', monospace;
    font-size: 13px;
    padding: 6px 10px;
    outline: none;
    width: 150px;
    letter-spacing: 0.04em;
  }
  .player-input::placeholder { color: rgba(245,233,208,0.4); }
  .ghost-btn {
    appearance: none;
    background: transparent;
    border: 1.5px solid var(--gold);
    color: var(--gold-pale);
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 0.12em;
    font-size: 14px;
    padding: 10px 16px;
    border-radius: 2px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    transition: all 0.15s;
    position: relative;
  }
  .ghost-btn::before, .ghost-btn::after {
    content: "";
    position: absolute;
    width: 6px; height: 6px;
    background: var(--gold);
    border-radius: 50%;
  }
  .ghost-btn::before { top: -3px; left: -3px; }
  .ghost-btn::after { bottom: -3px; right: -3px; }
  .ghost-btn:hover {
    background: rgba(212, 175, 55, 0.1);
    color: var(--ivory);
    box-shadow: 0 0 14px rgba(212, 175, 55, 0.4);
  }
  .ghost-num {
    background: var(--neon-red);
    color: var(--ivory);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 1px 7px;
    border-radius: 999px;
    box-shadow: 0 0 8px rgba(255, 43, 74, 0.7);
  }

  .title-wrap {
    text-align: center;
    line-height: 1;
  }
  .title {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-weight: 900;
    font-size: clamp(40px, 6vw, 72px);
    margin: 4px 0;
    color: var(--gold-pale);
    text-shadow:
      0 0 12px rgba(255, 43, 74, 0.8),
      0 0 30px rgba(255, 43, 74, 0.4),
      2px 2px 0 rgba(0,0,0,0.4);
    letter-spacing: 0.01em;
    animation: neon-flicker 4s infinite;
  }
  @keyframes neon-flicker {
    0%, 100%, 8%, 12%, 22%, 26% { opacity: 1; }
    10%, 24% { opacity: 0.85; }
  }
  .title-sub {
    font-family: 'Bebas Neue', sans-serif;
    color: var(--gold);
    letter-spacing: 0.4em;
    font-size: 13px;
    opacity: 0.85;
  }
  .title-tag {
    font-family: 'Special Elite', monospace;
    color: var(--neon-rose);
    font-size: 13px;
    letter-spacing: 0.15em;
    margin-top: 2px;
    opacity: 0.9;
  }

  .stage {
    position: relative;
    z-index: 2;
    max-width: 1200px;
    margin: 0 auto;
    padding: 8px 32px 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 36px;
  }

  .slot-machine {
    width: 100%;
    max-width: 1100px;
    position: relative;
    padding: 18px;
    background:
      linear-gradient(180deg, #2a0810 0%, #4a0e1a 60%, #2a0810 100%);
    border-radius: 14px;
    box-shadow:
      0 0 0 4px var(--gold-deep),
      0 0 0 6px var(--bg-deep),
      0 0 0 8px var(--gold),
      0 24px 60px rgba(0,0,0,0.6),
      inset 0 0 60px rgba(0,0,0,0.5);
  }
  .slot-machine::before, .slot-machine::after {
    content: "";
    position: absolute;
    left: 14px; right: 14px;
    height: 8px;
    background-image: radial-gradient(circle, var(--neon-red) 35%, transparent 36%);
    background-size: 16px 8px;
    background-repeat: repeat-x;
    filter: drop-shadow(0 0 4px var(--neon-red));
    animation: lamps 1.4s infinite linear;
  }
  .slot-machine::before { top: -4px; }
  .slot-machine::after { bottom: -4px; }
  @keyframes lamps {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .slot-frame {
    display: grid;
    grid-template-columns: 1.1fr 1.3fr 1.2fr 1.4fr;
    gap: 10px;
    background: var(--bg-deep);
    padding: 14px;
    border-radius: 8px;
    border: 2px solid var(--gold-deep);
  }
  .slot-cell-wrap {
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .slot-label {
    text-align: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 12px;
    letter-spacing: 0.3em;
    color: var(--gold);
    margin-bottom: 6px;
    height: 14px;
  }
  .slot-cell-wrap:nth-child(3) .slot-label::before { content: " "; }

  .slot-col {
    position: relative;
    height: 264px;
    overflow: hidden;
    background:
      linear-gradient(180deg, #faf2dd 0%, #f5e9d0 50%, #e8d8b0 100%);
    color: var(--ink);
    border-radius: 4px;
    box-shadow:
      inset 0 4px 12px rgba(0,0,0,0.5),
      inset 0 -4px 12px rgba(0,0,0,0.3);
    border: 2px solid var(--gold-deep);
  }
  .slot-col-inner {
    will-change: transform;
  }
  .slot-cell {
    height: 88px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 4px 10px;
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: clamp(14px, 1.4vw, 19px);
    line-height: 1.15;
    color: var(--ink);
    border-bottom: 1px dashed rgba(140, 106, 20, 0.3);
    text-wrap: pretty;
    hyphens: auto;
  }
  .slot-window {
    position: absolute;
    left: -2px; right: -2px;
    top: 88px; height: 88px;
    border-top: 2px solid var(--accent, var(--gold));
    border-bottom: 2px solid var(--accent, var(--gold));
    box-shadow:
      0 0 12px var(--accent, var(--gold)),
      inset 0 0 24px rgba(255, 43, 74, 0.15);
    pointer-events: none;
  }
  .slot-fade {
    position: absolute;
    left: 0; right: 0;
    height: 88px;
    pointer-events: none;
    z-index: 2;
  }
  .slot-fade-top {
    top: 0;
    background: linear-gradient(180deg,
      rgba(245, 233, 208, 0.95) 0%,
      rgba(245, 233, 208, 0.4) 60%,
      transparent 100%);
  }
  .slot-fade-bot {
    bottom: 0;
    background: linear-gradient(0deg,
      rgba(232, 216, 176, 0.95) 0%,
      rgba(232, 216, 176, 0.4) 60%,
      transparent 100%);
  }

  .cta-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }
  .big-spin {
    appearance: none;
    border: 0;
    cursor: pointer;
    padding: 6px;
    background: linear-gradient(180deg, var(--gold-pale), var(--gold-deep));
    border-radius: 999px;
    box-shadow:
      0 0 0 3px var(--bg-deep),
      0 0 0 5px var(--gold),
      0 12px 40px rgba(255, 43, 74, 0.5),
      0 0 60px rgba(255, 43, 74, 0.4);
    transition: transform 0.1s;
    animation: pulse-glow 2s infinite;
  }
  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 0 3px var(--bg-deep), 0 0 0 5px var(--gold), 0 12px 40px rgba(255,43,74,0.5), 0 0 60px rgba(255,43,74,0.4); }
    50% { box-shadow: 0 0 0 3px var(--bg-deep), 0 0 0 5px var(--gold), 0 12px 50px rgba(255,43,74,0.8), 0 0 100px rgba(255,43,74,0.7); }
  }
  .big-spin:hover { transform: scale(1.04); }
  .big-spin:active { transform: scale(0.98); }
  .big-spin.secondary {
    animation: none;
    background: linear-gradient(180deg, #f0c987, #8c6a14);
    box-shadow:
      0 0 0 3px var(--bg-deep),
      0 0 0 5px var(--gold),
      0 8px 24px rgba(0,0,0,0.5);
  }
  .big-spin.secondary .big-spin-inner {
    background: radial-gradient(circle at 30% 30%, #2a0810 0%, #1a0808 70%);
    font-size: 22px;
    padding: 22px 48px;
  }
  .big-spin-inner {
    display: block;
    background: radial-gradient(circle at 30% 30%, #c14b4b 0%, #5a0d1a 70%);
    color: var(--gold-pale);
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 0.18em;
    font-size: 28px;
    padding: 26px 64px;
    border-radius: 999px;
    text-shadow: 0 2px 0 rgba(0,0,0,0.6);
    border: 2px solid var(--gold);
  }
  .cta-warn {
    font-family: 'Special Elite', monospace;
    color: rgba(245, 233, 208, 0.7);
    font-size: 13px;
    text-align: center;
    max-width: 600px;
    letter-spacing: 0.04em;
  }

  .destinies {
    position: relative;
    width: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 28px;
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.4s, transform 0.4s;
    pointer-events: none;
  }
  .destinies.show {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }
  .destinies.partial {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }
  .vs-badge {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    background: var(--neon-red);
    color: var(--ivory);
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-weight: 900;
    font-size: 30px;
    width: 64px; height: 64px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 3;
    border: 3px solid var(--gold);
    box-shadow: 0 0 24px rgba(255, 43, 74, 0.8), 0 6px 14px rgba(0,0,0,0.5);
  }

  .destin-card {
    position: relative;
    background:
      linear-gradient(135deg, var(--ivory) 0%, var(--cream) 100%);
    color: var(--ink);
    padding: 32px 26px 24px;
    border-radius: 6px;
    box-shadow:
      0 0 0 2px var(--gold),
      0 0 0 6px var(--bg-deep),
      0 0 0 8px var(--gold),
      0 18px 40px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    text-align: center;
    transition: transform 0.15s;
    overflow: hidden;
  }
  .destin-card::before {
    content: "";
    position: absolute;
    inset: 8px;
    border: 1px dashed rgba(140, 106, 20, 0.35);
    pointer-events: none;
    border-radius: 3px;
  }
  .destin-card.left:hover { transform: translateX(-4px) rotate(-0.5deg); }
  .destin-card.right:hover { transform: translateX(4px) rotate(0.5deg); }
  .destin-corner {
    position: absolute;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-weight: 900;
    font-size: 28px;
    color: var(--copper);
    opacity: 0.9;
  }
  .destin-corner.tl { top: 8px; left: 14px; }
  .destin-corner.br { bottom: 6px; right: 14px; transform: rotate(180deg); }
  .destin-text {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    margin: 4px 0 14px;
  }
  .destin-prefix {
    font-family: 'Special Elite', monospace;
    font-size: 13px;
    color: rgba(26, 14, 8, 0.55);
    letter-spacing: 0.08em;
    margin: 2px 0;
  }
  .destin-action {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-weight: 900;
    font-size: clamp(22px, 2.4vw, 32px);
    color: var(--copper);
    line-height: 1;
  }
  .destin-nom {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(20px, 2vw, 26px);
    letter-spacing: 0.05em;
    color: var(--ink);
    text-transform: uppercase;
    line-height: 1.05;
  }
  .destin-adj {
    font-family: 'Special Elite', monospace;
    font-size: clamp(13px, 1.2vw, 15px);
    color: rgba(26, 14, 8, 0.75);
    letter-spacing: 0.04em;
  }
  .destin-divider {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 11px;
    letter-spacing: 0.4em;
    color: var(--gold-deep);
    margin: 10px 0 4px;
  }
  .destin-reward {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-weight: 700;
    font-size: clamp(15px, 1.4vw, 18px);
    color: #2d6a4f;
    text-decoration: underline;
    text-decoration-style: wavy;
    text-decoration-color: rgba(45, 106, 79, 0.5);
    text-underline-offset: 6px;
  }
  .destin-pick {
    appearance: none;
    width: 100%;
    background: linear-gradient(180deg, var(--copper) 0%, #7a1224 100%);
    color: var(--ivory);
    border: 2px solid var(--gold);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 0.18em;
    padding: 14px;
    border-radius: 4px;
    cursor: pointer;
    box-shadow: 0 4px 0 rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.2);
    transition: transform 0.08s, box-shadow 0.08s;
    margin-top: auto;
  }
  .destin-pick:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 6px 0 rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.2),
                0 0 24px rgba(255, 43, 74, 0.5);
  }
  .destin-pick:active:not(:disabled) {
    transform: translateY(2px);
    box-shadow: 0 1px 0 rgba(0,0,0,0.3);
  }
  .destin-pick:disabled { opacity: 0.4; cursor: not-allowed; }

  .phase-indicator {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 18px;
    background: rgba(0,0,0,0.35);
    border: 1px solid rgba(212,175,55,0.3);
    border-radius: 999px;
    font-family: 'Special Elite', monospace;
    font-size: 13px;
    color: rgba(245,233,208,0.85);
    letter-spacing: 0.04em;
  }
  .phase-dot {
    width: 22px; height: 22px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: rgba(245,233,208,0.08);
    border: 1px solid rgba(212,175,55,0.4);
    color: rgba(245,233,208,0.5);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 700;
  }
  .phase-dot.done {
    background: var(--gold);
    color: var(--ink);
    border-color: var(--gold);
  }
  .phase-dot.active {
    background: var(--neon-red);
    color: var(--ivory);
    border-color: var(--neon-red);
    box-shadow: 0 0 10px rgba(255,43,74,0.7);
    animation: pulse-dot 0.8s infinite;
  }
  .phase-dot.next {
    border-color: var(--neon-rose);
    color: var(--neon-rose);
  }
  @keyframes pulse-dot {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.15); }
  }
  .phase-line {
    width: 32px;
    height: 1px;
    background: rgba(212,175,55,0.3);
  }
  .phase-text { padding-left: 4px; }

  .destinies.partial .destin-card.right { opacity: 0.7; }
  .destin-card.empty {
    min-height: 280px;
    background:
      repeating-linear-gradient(45deg,
        rgba(245,233,208,0.06) 0 12px,
        rgba(245,233,208,0.02) 12px 24px);
    border: none;
    box-shadow:
      0 0 0 2px var(--gold-deep),
      0 0 0 6px var(--bg-deep),
      0 0 0 8px var(--gold-deep);
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(245,233,208,0.5);
  }
  .destin-empty-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 0.3em;
    color: rgba(245,233,208,0.45);
    text-align: center;
  }

  .result-sheet {
    position: relative;
    width: 100%;
    max-width: 760px;
    background:
      radial-gradient(ellipse at top, #faf2dd, var(--cream));
    color: var(--ink);
    padding: 36px 44px 28px;
    border-radius: 8px;
    text-align: center;
    box-shadow:
      0 0 0 2px var(--gold),
      0 0 0 6px var(--bg-deep),
      0 0 0 8px var(--gold),
      0 30px 80px rgba(0,0,0,0.6);
    animation: slamIn 0.5s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes slamIn {
    0% { transform: scale(0.5) rotate(-6deg); opacity: 0; }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }
  .result-stamp {
    position: absolute;
    top: -16px; right: 24px;
    background: var(--neon-red);
    color: var(--ivory);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 0.3em;
    padding: 8px 18px;
    border: 3px double var(--ivory);
    transform: rotate(4deg);
    box-shadow: 0 4px 14px rgba(0,0,0,0.4);
  }
  .result-choice {
    font-family: 'Special Elite', monospace;
    color: rgba(26, 14, 8, 0.6);
    font-size: 14px;
    letter-spacing: 0.1em;
    margin-bottom: 10px;
  }
  .result-choice b {
    color: var(--copper);

  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <script type="text/babel" data-presets="react">
  // ── vocab ────────────────────────────────────────────────────────────────
  const DEFAULT_VOCAB = {
    actions: [
      "enculer", "fister", "tabasser", "lécher", "embrasser", "épiler",
      "épouser", "masser", "doigter", "dévorer", "câliner", "renifler",

      "psychanalyser", "déshabiller", "engrosser", "kidnapper",
      "sodomiser", "gifler", "mordre", "vénérer",
    ],
    noms: [
      "Gérard Depardieu", "ton père", "ta mère", "le pape",
      "un chimpanzé en rut", "Jean-Marie Le Pen", "un troupeau de chèvres",
      "Patrick Sébastien", "ta belle-mère", "un livreur Uber Eats",
      "Vladimir Poutine", "un cactus géant", "un nain de jardin",
      "une mamie de 92 ans", "Cyril Hanouna", "ton prof de maths de 4e",
      "un poulpe radioactif", "Macron", "Donald Trump",
      "tout le RAID", "un troupeau de gendarmes", "ton boss",
      "un essaim de frelons", "le PSG au complet",
    ],
    adjectifs: [
      "violemment", "cordialement", "tendrement", "à sec",
      "en public", "sur scène à l'Olympia", "devant ta famille",
      "dans une station-service", "pendant 8 heures non-stop",
      "au ralenti", "en chantant la Marseillaise", "à reculons",
      "avec entrain", "passionnément", "professionnellement",
      "dans un kebab", "en direct sur TF1", "le dimanche après la messe",
      "au son de Patrick Sébastien", "avec amour", "très lentement",
      "à la chaîne", "sans préliminaires", "religieusement",
    ],
    recompenses: [
      "1 million d'euros", "la paix dans le monde", "un dé à coudre",
      "un trombone tordu", "une vie éternelle", "le Nobel de la paix",
      "un Kinder Surprise (sans le jouet)", "une PS5", "un câlin",
      "la fin du réchauffement climatique", "un bout de ficelle",
      "le respect de tes parents", "un chewing-gum déjà mâché",
      "une villa à Saint-Tropez", "un coupon -10% chez Lidl",
      "la réponse au sens de la vie", "un caillou", "rien du tout",
      "une médaille en chocolat", "le pouvoir absolu",
      "un yaourt périmé", "trois cacahuètes", "l'amour de ta vie",
      "une demi-baguette rassise",
    ],
  };

  const STORAGE_KEY = "rc_vocab_v1";
  const HISTORY_KEY = "rc_history_v1";
  const NAME_KEY = "rc_name_v1";
  const SETTINGS_KEY = "rc_settings_v1";

  function deepClone(o) { return JSON.parse(JSON.stringify(o)); }

  function loadVocab() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return deepClone(DEFAULT_VOCAB);
      const parsed = JSON.parse(raw);
      return {
        actions: parsed.actions || DEFAULT_VOCAB.actions,
        noms: parsed.noms || DEFAULT_VOCAB.noms,
        adjectifs: parsed.adjectifs || DEFAULT_VOCAB.adjectifs,
        recompenses: parsed.recompenses || DEFAULT_VOCAB.recompenses,
      };
    } catch (e) { return deepClone(DEFAULT_VOCAB); }
  }
  function saveVocab(v) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(v)); } catch (e) {} }
  function loadHistory() { try { const raw = localStorage.getItem(HISTORY_KEY); return raw ? JSON.parse(raw) : []; } catch (e) { return []; } }
  function saveHistory(h) { try { localStorage.setItem(HISTORY_KEY, JSON.stringify(h.slice(0, 100))); } catch (e) {} }
  function loadName() { try { return localStorage.getItem(NAME_KEY) || ""; } catch (e) { return ""; } }
  function saveName(n) { try { localStorage.setItem(NAME_KEY, n || ""); } catch (e) {} }

  function loadSettings() {
    try {
      const raw = localStorage.getItem(SETTINGS_KEY);
      if (!raw) return null;
      return JSON.parse(raw);
    } catch (e) { return null; }
  }
  function saveSettings(s) { try { localStorage.setItem(SETTINGS_KEY, JSON.stringify(s)); } catch (e) {} }

  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
  function rollDestin(vocab) {
    return {
      action: pick(vocab.actions),
      nom: pick(vocab.noms),
      adjectif: pick(vocab.adjectifs),
      recompense: pick(vocab.recompenses),
    };
  }
  function formatDestin(d) {
    return `Se faire ${d.action} par ${d.nom} ${d.adjectif} pour ${d.recompense}`;
  }

  // ── audio ────────────────────────────────────────────────────────────────
  let __ac = null;
  function ac() {
    if (!__ac) __ac = new (window.AudioContext || window.webkitAudioContext)();
    if (__ac.state === "suspended") __ac.resume();
    return __ac;
  }
  function playClick(volume = 0.15) {
    const c = ac(); const t = c.currentTime;
    const o = c.createOscillator(); const g = c.createGain();
    o.type = "square";
    o.frequency.setValueAtTime(1800, t);
    o.frequency.exponentialRampToValueAtTime(400, t + 0.04);
    g.gain.setValueAtTime(volume, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
    o.connect(g).connect(c.destination);
    o.start(t); o.stop(t + 0.06);
  }
  function playDrumroll(duration = 1.2, volume = 0.25) {
    const c = ac(); const start = c.currentTime;
    const buf = c.createBuffer(1, c.sampleRate * duration, c.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * Math.min(1, i / 2000);
    const src = c.createBufferSource();
    const filter = c.createBiquadFilter();
    filter.type = "bandpass"; filter.frequency.value = 180; filter.Q.value = 0.8;
    const g = c.createGain();
    g.gain.setValueAtTime(volume, start);
    g.gain.exponentialRampToValueAtTime(0.001, start + duration);
    src.buffer = buf;
    src.connect(filter).connect(g).connect(c.destination);
    src.start(start);
    return { stop: () => { try { src.stop(); } catch (e) {} } };
  }
  function playDefeat(volume = 0.18) {
    const c = ac(); const start = c.currentTime;
    const notes = [523, 494, 466, 440, 415, 392];
    notes.forEach((freq, i) => {
      const t = start + i * 0.18;
      const o = c.createOscillator(); const g = c.createGain();
      o.type = "sawtooth";
      o.frequency.setValueAtTime(freq, t);
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(volume, t + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
      o.connect(g).connect(c.destination);
      o.start(t); o.stop(t + 0.25);
    });
    setTimeout(() => {
      const t = c.currentTime;
      const o = c.createOscillator(); const g = c.createGain();
      o.type = "triangle";
      o.frequency.setValueAtTime(98, t);
      o.frequency.exponentialRampToValueAtTime(70, t + 0.6);
      g.gain.setValueAtTime(volume * 1.4, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.7);
      o.connect(g).connect(c.destination);
      o.start(t); o.stop(t + 0.75);
    }, notes.length * 180);
  }
  function playDing(volume = 0.18) {
    const c = ac(); const t = c.currentTime;
    [880, 1320].forEach((f, i) => {
      const o = c.createOscillator(); const g = c.createGain();
      o.type = "sine";
      o.frequency.setValueAtTime(f, t + i * 0.05);
      g.gain.setValueAtTime(volume, t + i * 0.05);
      g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.05 + 0.4);
      o.connect(g).connect(c.destination);
      o.start(t + i * 0.05); o.stop(t + i * 0.05 + 0.45);
    });
  }

  // ── slot ─────────────────────────────────────────────────────────────────
  const { useState, useEffect, useRef, useMemo, useCallback } = React;
  const COL_HEIGHT = 88;

  function SlotColumn({ items, target, spinning, spinKey, durationMs, onTick, onLand, accent }) {
    const innerRef = useRef(null);
    const [offset, setOffset] = useState(0);
    const tickRef = useRef(0);
    const offsetRef = useRef(0);
    offsetRef.current = offset;

    useEffect(() => {
      if (!spinning || !target) return;
      const list = items;
      if (list.length === 0) return;
      const targetIdx = list.indexOf(target);
      if (targetIdx < 0) return;

      const totalRotations = 4 + Math.random() * 2;
      const finalOffset = -((targetIdx - 1) * COL_HEIGHT + Math.floor(totalRotations) * list.length * COL_HEIGHT);
      const startOffset = offsetRef.current;
      const startTime = performance.now();
      let raf;

      const tick = (now) => {
        const elapsed = now - startTime;
        const t = Math.min(1, elapsed / durationMs);
        const eased = 1 - Math.pow(1 - t, 3);
        const cur = startOffset + (finalOffset - startOffset) * eased;
        setOffset(cur);

        const cellIdx = Math.floor(-cur / COL_HEIGHT);
        if (cellIdx !== tickRef.current) {
          tickRef.current = cellIdx;
          if (onTick) onTick();
        }

        if (t < 1) {
          raf = requestAnimationFrame(tick);
        } else {
          const normalized = -(targetIdx - 1) * COL_HEIGHT;
          setOffset(normalized);
          if (onLand) onLand();
        }
      };
      raf = requestAnimationFrame(tick);
      return () => cancelAnimationFrame(raf);
    }, [spinKey]);

    // Au moins floor(totalRotations)_max + 3 copies pour que la viewport reste
    // remplie pendant tout le défilement (sinon la colonne se vide juste avant
    // le snap final).
    const repeated = useMemo(() => Array.from({ length: 8 }, () => items).flat(), [items]);

    return (
      <div className="slot-col" style={{ "--accent": accent }}>
        <div className="slot-col-inner" ref={innerRef}
             style={{ transform: `translateY(${offset}px)` }}>
          {repeated.map((it, i) => (
            <div key={i} className="slot-cell">{it}</div>
          ))}
        </div>
        <div className="slot-fade slot-fade-top" />
        <div className="slot-fade slot-fade-bot" />
        <div className="slot-window" />
      </div>
    );
  }

  function SlotMachine({ vocab, target, spinKey, spinning, durationMs = 2200, onAllLanded, soundOn }) {
    const cols = [
      { key: "action",     items: vocab.actions,     target: target?.action,     dur: durationMs,         accent: "#f0c987" },
      { key: "nom",        items: vocab.noms,        target: target?.nom,        dur: durationMs + 350,   accent: "#e8a96b" },
      { key: "adjectif",   items: vocab.adjectifs,   target: target?.adjectif,   dur: durationMs + 700,   accent: "#d97757" },
      { key: "recompense", items: vocab.recompenses, target: target?.recompense, dur: durationMs + 1050,  accent: "#c14b4b" },
    ];
    const labels = ["SE FAIRE", "PAR", "", "POUR"];
    const landedCount = useRef(0);

    useEffect(() => { landedCount.current = 0; }, [spinKey]);

    return (
      <div className="slot-machine">
        <div className="slot-frame">
          {cols.map((c, i) => (
            <div key={c.key} className="slot-cell-wrap">
              <div className="slot-label">{labels[i] || " "}</div>
              <SlotColumn
                items={c.items}
                target={c.target}
                spinning={spinning}
                spinKey={spinKey}
                durationMs={c.dur}
                accent={c.accent}
                onTick={() => { if (soundOn) playClick(0.07); }}
                onLand={() => {
                  if (soundOn) playClick(0.18);
                  landedCount.current += 1;
                  if (landedCount.current === cols.length && onAllLanded) onAllLanded();
                }}
              />
            </div>
          ))}
        </div>
      </div>
    );
  }

  // ── vocab editor ─────────────────────────────────────────────────────────
  function VocabEditor({ vocab, setVocab }) {
    const [tab, setTab] = useState("actions");
    const [draft, setDraft] = useState("");
    const list = vocab[tab];

    const add = () => {
      const v = draft.trim();
      if (!v) return;
      if (list.includes(v)) { setDraft(""); return; }
      const next = { ...vocab, [tab]: [...list, v] };
      setVocab(next); setDraft("");
    };
    const remove = (i) => {
      if (list.length <= 2) return;
      setVocab({ ...vocab, [tab]: list.filter((_, j) => j !== i) });
    };
    const reset = () => {
      if (!confirm("Réinitialiser cette liste aux valeurs par défaut ?")) return;
      setVocab({ ...vocab, [tab]: [...DEFAULT_VOCAB[tab]] });
    };

    const tabs = [
      { k: "actions",     l: "Actions" },
      { k: "noms",        l: "Noms" },
      { k: "adjectifs",   l: "Adjectifs" },
      { k: "recompenses", l: "Récompenses" },
    ];

    return (
      <div className="vocab-editor">
        <div className="vocab-tabs">
          {tabs.map(t => (
            <button key={t.k} className={"vocab-tab " + (t.k === tab ? "active" : "")}
                    onClick={() => setTab(t.k)}>
              {t.l} <span className="vocab-count">{vocab[t.k].length}</span>
            </button>
          ))}
        </div>
        <div className="vocab-add">
          <input className="vocab-input" value={draft}
                 onChange={e => setDraft(e.target.value)}
                 onKeyDown={e => e.key === "Enter" && add()}
                 placeholder={`Ajouter un(e) ${tab.slice(0, -1)}...`} />
          <button className="vocab-btn" onClick={add}>+</button>
        </div>
        <div className="vocab-list">
          {list.map((it, i) => (
            <div key={i} className="vocab-item">
              <span>{it}</span>
              <button className="vocab-x" onClick={() => remove(i)}
                      title={list.length <= 2 ? "Minimum 2 entrées" : "Supprimer"}
                      disabled={list.length <= 2}>×</button>
            </div>
          ))}
        </div>
        <button className="vocab-reset" onClick={reset}>↺ Réinitialiser cette liste</button>
      </div>
    );
  }

  // ── hall of shame ────────────────────────────────────────────────────────
  function HallOfShame({ history, onClear, onClose }) {
    return (
      <div className="hos-overlay" onClick={onClose}>
        <div className="hos-modal" onClick={e => e.stopPropagation()}>
          <div className="hos-head">
            <div>
              <div className="hos-title">Tableau de la Honte</div>
              <div className="hos-sub">{history.length} destinée{history.length > 1 ? "s" : ""} subie{history.length > 1 ? "s" : ""}</div>
            </div>
            <button className="hos-close" onClick={onClose}>×</button>
          </div>
          <div className="hos-list">
            {history.length === 0 ? (
              <div className="hos-empty">Aucune destinée subie. Pour l'instant.</div>
            ) : history.map((h, i) => (
              <div key={i} className="hos-row">
                <div className="hos-num">#{history.length - i}</div>
                <div className="hos-text">
                  <b className="hos-name">{h.name || "Anonyme"}</b> a choisi de se faire <i>{h.action}</i> par <b>{h.nom}</b> {h.adjectif} pour <span className="hos-reward">{h.recompense}</span>.
                </div>
              </div>
            ))}
          </div>
          {history.length > 0 && (
            <button className="hos-clear" onClick={onClear}>Effacer l'historique</button>
          )}
        </div>
      </div>
    );
  }

  // ── destin card ──────────────────────────────────────────────────────────
  function DestinCard({ destin, side, onPick, disabled, locked }) {
    if (!destin) {
      return (
        <div className={"destin-card empty " + side}>
          <div className="destin-corner tl">{side === "left" ? "A" : "B"}</div>
          <div className="destin-corner br">{side === "left" ? "A" : "B"}</div>
          <div className="destin-empty-text">{locked ? "À RÉVÉLER…" : ""}</div>
        </div>
      );
    }
    return (
      <div className={"destin-card " + side}>
        <div className="destin-corner tl">{side === "left" ? "A" : "B"}</div>
        <div className="destin-corner br">{side === "left" ? "A" : "B"}</div>
        <div className="destin-text">
          <span className="destin-prefix">Se faire</span>
          <span className="destin-action">{destin.action}</span>
          <span className="destin-prefix">par</span>
          <span className="destin-nom">{destin.nom}</span>
          <span className="destin-adj">{destin.adjectif}</span>
          <div className="destin-divider">⸺ pour ⸺</div>
          <span className="destin-reward">{destin.recompense}</span>
        </div>
        <button className={"destin-pick " + side} onClick={onPick} disabled={disabled}>
          Je choisis {side === "left" ? "A" : "B"}
        </button>
      </div>
    );
  }

  // ── share sheet ──────────────────────────────────────────────────────────
  function ShareSheet({ destin, choice, onShare, onAgain, playerName }) {
    const [copied, setCopied] = useState(false);
    const click = () => {
      onShare();
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    };
    return (
      <div className="result-sheet">
        <div className="result-stamp">VERDICT</div>
        <div className="result-choice">
          {playerName
            ? <>Vous, <b>{playerName}</b>, avez choisi <b>{choice}</b></>
            : <>Vous avez choisi <b>{choice}</b></>}
        </div>
        <div className="result-text">
          <span className="r-prefix">se faire</span>
          <span className="r-action">{destin.action}</span>
          <span className="r-prefix">par</span>
          <span className="r-nom">{destin.nom}</span>
          <span className="r-adj">{destin.adjectif}</span>
          <div className="r-div">— pour —</div>
          <span className="r-rew">{destin.recompense}</span>
        </div>
        <div className="result-row">
          <button className="result-btn share" onClick={click}>
            {copied ? "✓ copié" : "Partager mon destin"}
          </button>
          <button className="result-btn again" onClick={onAgain}>Encore !</button>
        </div>
      </div>
    );
  }

  // ── settings (replaces design-mode TweaksPanel for standalone runtime) ──
  const DEFAULT_SETTINGS = { soundOn: true, shake: true, spinSpeed: "normal" };

  function SettingsBar({ settings, setSettings }) {
    const cycle = (key, options) => {
      const i = options.indexOf(settings[key]);
      setSettings({ ...settings, [key]: options[(i + 1) % options.length] });
    };
    return (
      <div className="settings-bar">
        <button className={"sb-toggle " + (settings.soundOn ? "on" : "")}
                onClick={() => setSettings({ ...settings, soundOn: !settings.soundOn })}>
          {settings.soundOn ? "♪ son" : "✕ son"}
        </button>
        <span className="sb-sep" />
        <button className={"sb-toggle " + (settings.shake ? "on" : "")}
                onClick={() => setSettings({ ...settings, shake: !settings.shake })}>
          {settings.shake ? "≋ shake" : "≋ off"}
        </button>
        <span className="sb-sep" />
        <button className="sb-toggle"
                onClick={() => cycle("spinSpeed", ["lent", "normal", "rapide"])}>
          ⏱ {settings.spinSpeed}
        </button>
      </div>
    );
  }

  // ── app ──────────────────────────────────────────────────────────────────
  function App() {
    const [settings, setSettingsState] = useState(() => loadSettings() || DEFAULT_SETTINGS);
    const setSettings = (s) => { setSettingsState(s); saveSettings(s); };

    const [vocab, setVocabState] = useState(() => loadVocab());
    const setVocab = useCallback((v) => { setVocabState(v); saveVocab(v); }, []);

    const [history, setHistory] = useState(() => loadHistory());
    const [playerName, setPlayerNameState] = useState(() => loadName());
    const setPlayerName = (n) => { setPlayerNameState(n); saveName(n); };

    const [showShame, setShowShame] = useState(false);
    const [showVocab, setShowVocab] = useState(false);
    const [showShare, setShowShare] = useState(null);

    const [phase, setPhase] = useState("idle");
    const [destinA, setDestinA] = useState(null);
    const [destinB, setDestinB] = useState(null);
    const [slotTarget, setSlotTarget] = useState(null);
    const [spinKey, setSpinKey] = useState(0);
    const [shaking, setShaking] = useState(false);

    const drumrollRef = useRef(null);
    const speedMs = { lent: 3500, normal: 2200, rapide: 1300 }[settings.spinSpeed] || 2200;

    const startDrumroll = () => {
      if (settings.soundOn) drumrollRef.current = playDrumroll(speedMs / 1000 + 1.0, 0.18);
    };
    const stopDrumroll = () => {
      if (drumrollRef.current) { drumrollRef.current.stop(); drumrollRef.current = null; }
    };

    const spinFirst = () => {
      if (phase === "spin1" || phase === "spin2") return;
      const a = rollDestin(vocab);
      setDestinA(a); setDestinB(null);
      setSlotTarget(a);
      setPhase("spin1");
      setSpinKey(k => k + 1);
      startDrumroll();
    };

    const spinSecond = () => {
      if (phase === "spin1" || phase === "spin2") return;
      let b = rollDestin(vocab);
      let tries = 0;
      while (destinA && formatDestin(destinA) === formatDestin(b) && tries < 20) {
        b = rollDestin(vocab); tries++;
      }
      setDestinB(b);
      setSlotTarget(b);
      setPhase("spin2");
      setSpinKey(k => k + 1);
      startDrumroll();
    };

    const onAllLanded = () => {
      stopDrumroll();
      if (settings.soundOn) playDing();
      setPhase(prev => {
        if (prev === "spin1") return "reveal1";
        if (prev === "spin2") return "choose";
        return prev;
      });
    };

    const choose = (which) => {
      if (phase !== "choose") return;
      const picked = which === "A" ? destinA : destinB;
      const entry = { ...picked, name: playerName || "Anonyme", at: Date.now() };
      setHistory(h => { const next = [entry, ...h]; saveHistory(next); return next; });
      if (settings.soundOn) playDefeat();
      if (settings.shake) {
        setShaking(true);
        setTimeout(() => setShaking(false), 800);
      }
      setShowShare({ destin: picked, choice: which });
      setPhase("resolved");
    };

    const reset = () => {
      setShowShare(null);
      setDestinA(null); setDestinB(null);
      setSlotTarget(null);
      setPhase("idle");
    };

    const shareDestin = (d) => {
      const who = playerName || "Quelqu'un";
      const text = `🎰 ROULETTE CONGOLAISE\n\n${who} a dû se faire ${d.action} par ${d.nom} ${d.adjectif} pour ${d.recompense}.\n\nEt vous, vous tombez sur quoi ?`;
      if (navigator.clipboard) navigator.clipboard.writeText(text);
      return text;
    };

    const isSpinning = phase === "spin1" || phase === "spin2";
    const showCards = phase === "reveal1" || phase === "spin2" || phase === "choose";

    return (
      <div className={"app " + (shaking ? "shaking" : "")}>
        <div className="bg-vignette" />
        <div className="bg-stars">{Array.from({length: 60}).map((_, i) => (
          <span key={i} style={{
            left: `${(i * 73) % 100}%`,
            top: `${(i * 37) % 100}%`,
            animationDelay: `${(i * 0.13) % 3}s`
          }} />
        ))}</div>

        <header className="head">
          <div className="head-left">
            <button className="ghost-btn" onClick={() => setShowShame(true)}>
              <span className="ghost-num">{history.length}</span>
              Tableau de la honte
            </button>
          </div>
          <div className="title-wrap">
            <div className="title-sub">— ★ établi 2026 ★ —</div>
            <h1 className="title">Roulette Congolaise</h1>
            <div className="title-tag">on ne peut que perdre</div>
          </div>
          <div className="head-right">
            <button className="ghost-btn" onClick={() => setShowVocab(v => !v)}>
              {showVocab ? "Fermer la banque" : "Banque de mots"}
            </button>
            <div className="player-input-wrap">
              <span className="player-label">Joueur</span>
              <input className="player-input"
                     value={playerName}
                     onChange={e => setPlayerName(e.target.value.slice(0, 24))}
                     placeholder="Votre nom..."
                     maxLength={24} />
            </div>
          </div>
        </header>

        <main className="stage">
          <SlotMachine
            vocab={vocab}
            target={slotTarget}
            spinKey={spinKey}
            spinning={isSpinning}
            durationMs={speedMs}
            soundOn={settings.soundOn}
            onAllLanded={onAllLanded}
          />

          {phase !== "idle" && phase !== "resolved" && (
            <div className="phase-indicator">
              <span className={"phase-dot " + (destinA ? "done" : (phase === "spin1" ? "active" : ""))}>1</span>
              <span className="phase-line" />
              <span className={"phase-dot " + (destinB ? "done" : (phase === "spin2" ? "active" : (phase === "reveal1" ? "next" : "")))}>2</span>
              <span className="phase-text">
                {phase === "spin1" && "Tirage de la destinée A…"}
                {phase === "reveal1" && "Destinée A révélée — il en reste une"}
                {phase === "spin2" && "Tirage de la destinée B…"}
                {phase === "choose" && "Faites votre choix. Aucun n'est bon."}
              </span>
            </div>
          )}

          {phase === "idle" && (
            <div className="cta-wrap">
              <button className="big-spin" onClick={spinFirst}>
                <span className="big-spin-inner">TOURNER LA ROUE</span>
              </button>
              <div className="cta-warn">⚠ deux destinées vous seront proposées, l'une après l'autre. Vous devrez en choisir une. Il n'y a pas d'échappatoire.</div>
            </div>
          )}

          {phase === "reveal1" && (
            <div className="cta-wrap">
              <button className="big-spin secondary" onClick={spinSecond}>
                <span className="big-spin-inner">TIRER LA 2ᵉ DESTINÉE</span>
              </button>
              <div className="cta-warn">Le sort en a décidé une. La roulette tournera encore une fois.</div>
            </div>
          )}

          {showCards && (
            <div className={"destinies " + (phase === "choose" ? "show" : "partial")}>
              <div className="vs-badge">VS</div>
              <DestinCard destin={destinA} side="left"
                          onPick={() => choose("A")}
                          disabled={phase !== "choose"} />
              <DestinCard destin={destinB} side="right"
                          locked={phase === "reveal1" || phase === "spin2"}
                          onPick={() => choose("B")}
                          disabled={phase !== "choose"} />
            </div>
          )}

          {phase === "resolved" && showShare && (
            <ShareSheet
              destin={showShare.destin}
              choice={showShare.choice}
              playerName={playerName}
              onShare={() => shareDestin(showShare.destin)}
              onAgain={reset} />
          )}
        </main>

        {showShame && (
          <HallOfShame
            history={history}
            onClear={() => { setHistory([]); saveHistory([]); }}
            onClose={() => setShowShame(false)} />
        )}

        {showVocab && (
          <div className="vocab-overlay" onClick={() => setShowVocab(false)}>
            <div className="vocab-modal" onClick={e => e.stopPropagation()}>
              <div className="vocab-head">
                <div className="vocab-title">Banque de mots</div>
                <button className="hos-close" onClick={() => setShowVocab(false)}>×</button>
              </div>
              <VocabEditor vocab={vocab} setVocab={setVocab} />
            </div>
          </div>
        )}

        <SettingsBar settings={settings} setSettings={setSettings} />

        <footer className="foot">
          <span>♠ ♥ ♣ ♦</span>
          <span className="foot-mid">aucune chance n'a été harmée durant ce jeu</span>
          <span>♦ ♣ ♥ ♠</span>
        </footer>
      </div>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
  </script>
</body>
</html>
